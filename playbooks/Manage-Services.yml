---
- name: Manage Windows Services
  hosts: all
  gather_facts: true
  become: true

  vars:
    service_name: "wuauserv"   # Default: Windows Update service. Change as needed.
    service_state: "started"   # Default: started. Options: started, stopped, restarted

  tasks:
    - name: Ensure service is in desired state
      win_service:
        name: "{{ service_name }}"
        state: "{{ service_state }}"
      register: service_result

    - name: Display service status
      debug:
        msg: "Service {{ service_name }} is now {{ service_state }}."
