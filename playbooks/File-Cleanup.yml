---
- name: File Cleanup Playbook
  hosts: all
  gather_facts: true
  become: true

  vars:
    cleanup_path: 'C:\\Temp'
    file_age_days: 30

  tasks:
    - name: Find files older than specified days
      win_find:
        paths: "{{ cleanup_path }}"
        age: "{{ file_age_days }}d"
        age_stamp: mtime
      register: old_files

    - name: Remove old files
      win_file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ old_files.files }}"
      when: old_files.files | length > 0
      loop_control:
        label: "{{ item.path }}"
