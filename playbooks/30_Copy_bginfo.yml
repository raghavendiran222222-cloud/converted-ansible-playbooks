---
- name: Copy BGInfo Utility to Windows Hosts
  hosts: windows
  gather_facts: false
  vars:
    bginfo_source: "\\server\share\BGInfo.exe"
    bginfo_dest: "C:\\Tools\\BGInfo.exe"
    bginfo_config: "\\server\share\BGInfoConfig.bgi"
    bginfo_config_dest: "C:\\Tools\\BGInfoConfig.bgi"
  tasks:
    - name: Ensure BGInfo destination directory exists
      ansible.windows.win_file:
        path: "C:\\Tools"
        state: directory

    - name: Copy BGInfo executable
      ansible.windows.win_copy:
        src: "{{ bginfo_source }}"
        dest: "{{ bginfo_dest }}"
      # If src is a network share, ensure credentials are handled via AAP/Vault

    - name: Copy BGInfo configuration file
      ansible.windows.win_copy:
        src: "{{ bginfo_config }}"
        dest: "{{ bginfo_config_dest }}"
      # If src is a network share, ensure credentials are handled via AAP/Vault

    - name: Run BGInfo with configuration
      ansible.windows.win_shell:
        cmd: '"{{ bginfo_dest }}" /SILENT /TIMER:0 /CONFIG="{{ bginfo_config_dest }}"'
      args:
        creates: "C:\\Tools\\BGInfo.exe"
      # win_shell used as no dedicated module for BGInfo execution
      # Idempotency ensured via 'creates' argument
